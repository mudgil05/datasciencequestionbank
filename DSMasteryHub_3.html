<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DS Mastery Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
:root{
  --ng:#00ff88;--nc:#00e5ff;--np:#ff0080;--nv:#aa00ff;--ny:#ffee00;--no:#ff6600;
  --line:#151515;--card:#0a0a0a;
  --fh:'Orbitron',monospace;--fb:'Rajdhani',sans-serif;--fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:var(--fb);font-size:16px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(#00ff8806 1px,transparent 1px),linear-gradient(90deg,#00ff8806 1px,transparent 1px);background-size:50px 50px}
::-webkit-scrollbar{width:6px;background:#000}
::-webkit-scrollbar-thumb{background:var(--ng);border-radius:3px;opacity:.3}
h1,h2,h3,h4{font-family:var(--fh);font-weight:700;letter-spacing:.5px}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--nc);text-decoration:none}
a:hover{text-shadow:0 0 8px var(--nc)}
.app{position:relative;z-index:1;min-height:100vh;display:flex}
.sb{width:72px;position:fixed;top:0;left:0;bottom:0;z-index:100;background:#000;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:8px}
.logo{width:40px;height:40px;margin-bottom:20px;background:conic-gradient(from 0deg,var(--ng),var(--nc),var(--nv),var(--np),var(--ng));clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);animation:spin 10s linear infinite;cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
.nav{width:52px;height:52px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:.2s;color:#444;border:1px solid transparent}
.nav:hover{background:#0d0d0d;color:#888;border-color:#1a1a1a}
.nav.a{background:#0d0d0d;border-color:var(--ng);color:var(--ng);box-shadow:0 0 16px #00ff8844}
.nav-i{font-size:18px}
.nav-l{font-size:9px;font-family:var(--fm);letter-spacing:.5px;text-transform:uppercase}
.main{margin-left:72px;flex:1;min-height:100vh}
.tbar{position:fixed;top:0;left:72px;right:0;z-index:90;height:56px;background:rgba(0,0,0,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 28px;gap:20px}
.tbar-title{font-family:var(--fh);font-size:15px;font-weight:700;letter-spacing:1px;color:var(--ng);text-shadow:0 0 12px var(--ng)}
.tbar-sp{flex:1}
.api-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid;border-radius:4px;font-family:var(--fm);font-size:11px;cursor:pointer;transition:.2s}
.api-chip.on{border-color:#00ff8855;color:var(--ng);background:#00ff8815}
.api-chip.off{border-color:#ff008055;color:var(--np);background:#ff008015}
.api-chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;animation:blink 2s infinite}
@keyframes blink{50%{opacity:.3}}
.content{padding:80px 32px 48px;max-width:1280px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;transition:.2s;overflow:hidden}
.card:hover{border-color:#00ff8844;box-shadow:0 0 20px #00ff8822;transform:translateY(-2px)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:6px;font-family:var(--fb);font-size:14px;font-weight:600;letter-spacing:.3px;border:1px solid;transition:.2s;white-space:nowrap;background:transparent}
.btn:hover{transform:translateY(-1px)}
.btn-ng{background:#00ff8815;border-color:#00ff8866;color:var(--ng)}
.btn-ng:hover{background:#00ff8825;box-shadow:0 0 20px #00ff8866}
.btn-nc{background:#00e5ff15;border-color:#00e5ff66;color:var(--nc)}
.btn-nc:hover{background:#00e5ff25;box-shadow:0 0 20px #00e5ff66}
.btn-nv{background:#aa00ff15;border-color:#aa00ff66;color:var(--nv)}
.btn-np{background:#ff008015;border-color:#ff008066;color:var(--np)}
.btn-ghost{border-color:#2a2a2a;color:#888}
.btn-ghost:hover{border-color:#555;color:#ddd}
.btn-solid{background:var(--ng);border-color:var(--ng);color:#000;font-weight:700}
.btn-solid:hover{box-shadow:0 0 30px #00ff8888}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-lg{padding:14px 32px;font-size:16px}
.input{background:#060606;border:1px solid var(--line);border-radius:6px;padding:10px 14px;color:#fff;font-family:var(--fb);font-size:14px;outline:none;width:100%;transition:.2s}
.input:focus{border-color:var(--nc);box-shadow:0 0 0 2px #00e5ff22}
.input::placeholder{color:#333}
.hero{padding:60px 0 40px;position:relative}
.htag{display:inline-flex;align-items:center;gap:8px;margin-bottom:24px;padding:6px 16px;border:1px solid #00ff8833;border-radius:100px;background:#00ff8810;font-family:var(--fm);font-size:11px;color:var(--ng);letter-spacing:1.5px}
.htag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ng);box-shadow:0 0 8px var(--ng);animation:blink 1.5s infinite}
.htit{font-family:var(--fh);font-size:clamp(40px,6vw,72px);font-weight:900;line-height:1.05;margin-bottom:20px;letter-spacing:-1px}
.hgrad{background:linear-gradient(135deg,var(--ng) 0%,var(--nc) 50%,var(--nv) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hsub{font-size:18px;color:#888;max-width:600px;line-height:1.7;margin-bottom:36px}
.hact{display:flex;gap:14px;flex-wrap:wrap}
.sec{margin:48px 0}
.seyb{font-family:var(--fm);font-size:11px;color:#666;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:12px}

.stit{font-family:var(--fh);font-size:28px;font-weight:700}
.ssub{color:#666;font-size:15px;margin-top:8px}
.g-topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.g-stat{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.g-proj{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
.tc{padding:22px;cursor:pointer;position:relative;overflow:hidden;border-radius:10px;background:var(--card);border:1px solid var(--line);transition:.2s}
.tc:hover{transform:translateY(-3px)}
.tc-i{font-size:30px;margin-bottom:12px;display:block}
.tc-n{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:4px}
.tc-m{font-family:var(--fm);font-size:11px;color:#555;letter-spacing:.5px}
.tc-bar{height:4px;background:#0d0d0d;margin-top:14px;border-radius:2px;overflow:hidden}
.tc-bar-fl{height:100%;transition:width 1s ease;border-radius:2px}
.tc-pct{font-family:var(--fm);font-size:10px;margin-top:6px;color:#444}
.qlist{display:flex;flex-direction:column;gap:8px}
.qrow{padding:16px 20px;background:var(--card);border:1px solid var(--line);border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:.15s}
.qrow:hover{border-color:#00ff8855;transform:translateX(4px)}
.qrow.done{border-left:3px solid var(--ng)}
.qrow.fail{border-left:3px solid var(--np)}
.qnum{font-family:var(--fm);font-size:11px;color:#444;min-width:36px}
.qtit{flex:1;font-size:14px;font-weight:500;color:#ddd}
.qbdg{padding:3px 10px;border-radius:3px;font-family:var(--fm);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:1px solid}
.b-easy{background:#00ff8815;color:var(--ng);border-color:#00ff8844}
.b-med{background:#ffee0015;color:var(--ny);border-color:#ffee0044}
.b-hard{background:#ff008015;color:var(--np);border-color:#ff008044}
.pagi{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:28px;flex-wrap:wrap}
.pgb{padding:7px 14px;border:1px solid var(--line);background:var(--card);color:#666;font-family:var(--fm);font-size:12px;cursor:pointer;border-radius:5px;transition:.15s}
.pgb:hover:not(:disabled){border-color:var(--ng);color:var(--ng)}
.pgb.a{background:var(--ng);border-color:var(--ng);color:#000;font-weight:700}
.pgb:disabled{opacity:.3;cursor:not-allowed}
.modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;animation:fin .2s}
@keyframes fin{from{opacity:0}to{opacity:1}}
.mbox{background:#050505;border:1px solid var(--line);border-radius:12px;width:100%;max-width:920px;margin:auto;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.8)}
.mh{padding:22px 28px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.mb{padding:24px 28px;max-height:75vh;overflow-y:auto}
.scenar{background:#050505;border:1px solid var(--line);border-left:3px solid var(--nc);border-radius:6px;padding:16px 18px;margin-bottom:16px;font-size:14px;line-height:1.7;color:#ccc}
.scenar-lbl{font-family:var(--fm);font-size:10px;color:var(--nc);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.qp{font-size:15px;font-weight:500;color:#fff;margin-bottom:16px;line-height:1.6}
.qopts{display:flex;flex-direction:column;gap:10px}
.qopt{padding:13px 17px;border:1px solid var(--line);border-radius:6px;background:#0a0a0a;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;color:#ccc;font-family:var(--fb);font-size:14px}
.qopt:hover:not(.dis){border-color:#00ff8855;background:#00ff8808}
.qopt.ok{border-color:var(--ng);background:#00ff8810;color:var(--ng)}
.qopt.no{border-color:var(--np);background:#ff008010;color:var(--np)}
.qopt.shown{border-color:#00ff8866}
.qopt.dis{cursor:default}
.qk{width:26px;height:26px;border-radius:5px;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:12px;color:#555;flex-shrink:0;font-weight:600}
.qopt.ok .qk{border-color:var(--ng);color:var(--ng);background:#00ff8820}
.qopt.no .qk{border-color:var(--np);color:var(--np);background:#ff008020}
.qfb{margin-top:18px;padding:16px 18px;border-radius:6px;animation:slup .3s}
@keyframes slup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qfb-ok{background:#00ff8810;border:1px solid #00ff8844}
.qfb-no{background:#ff008010;border:1px solid #ff008044}
.qfb-t{font-family:var(--fh);font-weight:700;margin-bottom:8px;font-size:14px}
.qfb-e{font-size:13px;color:#aaa;line-height:1.7}
.qtags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.qtag{font-size:10px;padding:2px 8px;border:1px solid var(--line);color:#666;font-family:var(--fm);letter-spacing:.3px;border-radius:3px}
.psec{background:#050505;border:1px solid var(--line);border-radius:8px;padding:20px;margin-bottom:18px}
.psec-t{font-family:var(--fm);font-size:10px;color:var(--ng);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px}
.ptable{width:100%;border-collapse:collapse;font-family:var(--fm);font-size:12px;margin:12px 0}
.ptable th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);color:var(--nc);font-weight:600;background:#0a0a0a}
.ptable td{padding:7px 10px;border-bottom:1px solid #0d0d0d;color:#aaa}
.ptable tr:hover td{background:#080808;color:#ddd}
.plist{list-style:none;padding:0;margin:0}
.plist li{padding:11px 15px;background:#0a0a0a;border:1px solid var(--line);border-radius:5px;margin-bottom:8px;font-size:14px;color:#bbb;display:flex;gap:14px;align-items:flex-start;line-height:1.6}
.pnum{font-family:var(--fm);font-size:11px;color:var(--ng);font-weight:700;min-width:22px;flex-shrink:0}
.phint{padding:13px 16px;background:#0a0800;border:1px solid #ffee0022;border-radius:6px;font-size:13px;color:#ccc;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;line-height:1.7}
.phint-n{color:var(--ny);font-family:var(--fm);font-size:11px;font-weight:700;flex-shrink:0}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.ach{padding:20px;border-radius:10px;border:1px solid var(--line);text-align:center;background:var(--card);transition:.2s;position:relative;overflow:hidden}
.ach.locked{opacity:.4;filter:grayscale(1)}
.ach.won{border-color:var(--ny);box-shadow:0 0 20px #ffee0033}
.ach-i{font-size:32px;margin-bottom:10px;display:block}
.ach-n{font-family:var(--fh);font-size:13px;font-weight:700;color:#ddd;margin-bottom:4px}
.ach-d{font-size:11px;color:#666;line-height:1.5}
.stat{padding:20px;border:1px solid var(--line);border-radius:8px;background:var(--card);text-align:center;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--sc,var(--ng));box-shadow:0 0 10px var(--sc,var(--ng))}
.stat-v{font-family:var(--fh);font-size:32px;font-weight:800;margin-bottom:2px}
.stat-l{font-family:var(--fm);font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.stat-c{font-family:var(--fm);font-size:11px;color:#666;margin-top:2px}
.intc{padding:22px;border:1px solid var(--line);border-radius:10px;background:var(--card);margin-bottom:16px}
.intc-h{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.intc-i{font-size:28px}
.intc-t{font-family:var(--fh);font-size:16px;font-weight:700}
.intc-s{font-size:12px;font-family:var(--fm);margin-top:2px}
.intc-s.ok{color:var(--ng)}
.intc-s.off{color:#666}
.intc-d{font-size:13px;color:#888;line-height:1.7;margin-bottom:14px}
.intc-steps{background:#050505;border:1px solid var(--line);border-radius:6px;padding:14px 18px;margin-bottom:14px}
.intc-steps ol{margin:0;padding-left:20px;font-size:13px;color:#aaa;line-height:1.9}
.intc-steps code{background:#000;padding:2px 6px;font-family:var(--fm);font-size:11px;color:var(--nc);border-radius:3px}
.toast{position:fixed;bottom:24px;right:24px;z-index:1000;padding:14px 20px;background:#050505;border:1px solid var(--ng);border-radius:8px;font-family:var(--fm);font-size:13px;color:var(--ng);box-shadow:0 0 24px #00ff8844;animation:slin .3s}
@keyframes slin{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:768px){
  .sb{width:56px}.main{margin-left:56px}.tbar{left:56px;padding:0 16px}
  .content{padding:80px 16px 48px}
  .g-topics,.ach-grid,.g-stat{grid-template-columns:repeat(2,1fr)}
  .g-proj{grid-template-columns:1fr}
  .htit{font-size:40px}
}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
"use strict";
const {useState,useEffect,useRef,useMemo,useCallback} = React;

// ═══════════════════════════════════════════════════════════
// BACKEND API CLIENT
// ═══════════════════════════════════════════════════════════
const Api = {
  url: () => {
    try { return localStorage.getItem('dsm_backend_url') || ''; }
    catch(e) { return ''; }
  },
  async call(path, opts={}) {
    const base = Api.url();
    if (!base) return null;
    try {
      const r = await fetch(base + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...(opts.headers||{}) }
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.json();
    } catch(e) {
      console.warn('API call failed:', path, e.message);
      return null;
    }
  }
};

// ═══════════════════════════════════════════════════════════
// STORAGE (localStorage + optional backend sync)
// ═══════════════════════════════════════════════════════════
const DB = {
  get(k, d) {
    try { const v = localStorage.getItem('dsm_'+k); return v ? JSON.parse(v) : d; }
    catch(e) { return d; }
  },
  set(k, v) {
    try { localStorage.setItem('dsm_'+k, JSON.stringify(v)); return true; }
    catch(e) { return false; }
  },
  del(k) { try { localStorage.removeItem('dsm_'+k); } catch(e) {} }
};

// ═══════════════════════════════════════════════════════════
// TOPICS
// ═══════════════════════════════════════════════════════════
const TOPICS = [
  {id:'python', n:'Python',          i:'🐍', c:'#00ff88'},
  {id:'sql',    n:'SQL',             i:'🗄️', c:'#00e5ff'},
  {id:'pandas', n:'Pandas & NumPy',  i:'🐼', c:'#ffee00'},
  {id:'stats',  n:'Statistics',      i:'📊', c:'#ff0080'},
  {id:'prob',   n:'Probability',     i:'🎲', c:'#aa00ff'},
  {id:'ml',     n:'Machine Learning',i:'🤖', c:'#aa00ff'},
  {id:'dl',     n:'Deep Learning',   i:'🧠', c:'#00e5ff'},
  {id:'nlp',    n:'NLP & LLMs',      i:'💬', c:'#00ff88'},
  {id:'viz',    n:'Visualization',   i:'📈', c:'#ff6600'},
  {id:'mlops',  n:'MLOps',           i:'🚀', c:'#ff0080'}
];

// Question constructor: d=difficulty, t=title, s=scenario, p=prompt, o=options, c=correct idx, e=explanation, tg=tags
const Q = (d,t,s,p,o,c,e,tg) => ({d,t,s,p,o,c,e,tg:tg||[]});

// ═══════════════════════════════════════════════════════════
// QUESTION BANK — 40+ per topic, scenario-based, tagged
// ═══════════════════════════════════════════════════════════
const QS = {

// ─────────── PYTHON (40) ───────────
python: [
Q('easy','Sum Daily Revenue','E-commerce startup. Marketing asks total revenue today.','Given orders=[45.99,120.00,8.50,76.25,210.00], expression for total?',['sum(orders)','total(orders)','orders.sum()','add(orders)'],0,'sum() is built-in for lists. .sum() only on NumPy/pandas objects.',['basics','aggregation']),
Q('easy','Filter High-Value Customers','CRM has customer LTVs. Want only LTV > $1000.','Given ltv=[450,1200,300,5000,800], which returns only high-value LTVs?',['[x for x in ltv if x > 1000]','[x > 1000 for x in ltv]','ltv.filter(x > 1000)','filter(ltv, 1000)'],0,'List comprehension filters. Option B returns booleans not values.',['comprehension','filter']),
Q('easy','Handle Missing Prices','Legacy products have None as price. Need safe default of 0.','For p={"price":None}, which returns 0 if price is None?',['p.get("price", 0) or 0','p["price"]','p.price or 0','get(p,"price",0)'],0,'.get() returns None for missing; "or 0" catches None.',['dict','none']),
Q('easy','Unique Visitor Count','Web logs have duplicate visitor IDs. Growth wants unique count.','For visits=[101,205,101,302,205,401], count uniques?',['len(set(visits))','unique(visits)','visits.unique()','count(visits)'],0,'set() removes dups; len() counts. O(n) and idiomatic.',['set','counting']),
Q('easy','Format Currency','Finance wants revenue as "$1,234,567.89".','For rev=1234567.891, which formats correctly?',['f"${rev:,.2f}"','f"${rev:.2f}"','str(rev)','format(rev,"$%.2f")'],0,':, adds thousand separators. .2f gives 2 decimals.',['f-string','format']),
Q('easy','Extract Email Domain','User DB has emails. Marketing wants domain distribution.','For email="user@gmail.com", extract "gmail.com"?',['email.split("@")[1]','email.split("@")[0]','email.domain()','email[email.index("@"):]'],0,'split("@") returns ["user","gmail.com"]. Index [1] gets domain.',['string','split']),
Q('easy','Conversion Rate','1,250 visitors, 47 conversions.','Conversion rate as % (2 decimals)?',['round(47/1250*100, 2)','round(47/1250, 2)','int(47/1250*100)','47/1250*100'],0,'Divide, ×100, round. Result: 3.76%.',['math','rounding']),
Q('easy','Word Frequency','Customer feedback text. Want top 5 words.','Most elegant stdlib?',['collections.Counter','dict()','collections.defaultdict','set()'],0,'Counter(words).most_common(5) gives top 5 directly.',['stdlib','counter']),
Q('easy','Pagination','500 items, 20/page. Item index 386 on which page?','Compute 1-indexed page?',['386 // 20 + 1','386 / 20','386 % 20','386 // 20'],0,'Integer division gives 19, +1 = page 20.',['math']),

// DATASET GENERATORS — one per project

// 1. SaaS Churn (existing)
function generateChurnDataset(){
  const rng=mulberry32(42);const rows=[];
  const plans=['Basic','Standard','Premium'];
  const countries=['US','UK','DE','FR','JP','IN','BR','CA','AU','NL'];
  const reasons=['organic','paid_ad','referral','social','search'];
  for(let i=1;i<=1200;i++){
    const tenure=Math.floor(rng()*48)+1;
    const plan=plans[Math.floor(rng()*3)];
    const mc=plan==='Basic'?9.99+rng()*5:plan==='Standard'?19.99+rng()*10:39.99+rng()*20;
    const tc=+(mc*tenure*(0.8+rng()*0.4)).toFixed(2);
    const tickets=Math.floor(rng()*12);
    const logins=Math.floor(rng()*30);
    const session=+(rng()*60+2).toFixed(1);
    const country=countries[Math.floor(rng()*countries.length)];
    const reason=reasons[Math.floor(rng()*reasons.length)];
    const autopay=rng()>0.4?1:0;
    const refs=Math.floor(rng()*5);
    let p=0.05;
    if(tenure<6)p+=0.25;if(logins<3)p+=0.30;if(tickets>5)p+=0.20;
    if(!autopay)p+=0.10;if(plan==='Basic')p+=0.08;if(session<5)p+=0.15;
    rows.push({customer_id:'C'+(10000+i),tenure_months:tenure,plan,monthly_charges:+mc.toFixed(2),total_charges:tc,support_tickets:tickets,logins_last_30d:logins,avg_session_minutes:session,country,signup_reason:reason,has_autopay:autopay,num_referrals:refs,churned:rng()<Math.min(p,0.85)?1:0});
  }
  return rows;
}

// 2. E-commerce Sales (for SQL / Pandas)
function generateSalesDataset(){
  const rng=mulberry32(7);const rows=[];
  const categories=['Electronics','Clothing','Home','Books','Sports','Beauty','Toys'];
  const channels=['web','mobile','store','marketplace'];
  const countries=['US','UK','DE','FR','JP','IN','BR','CA'];
  const startDate=new Date('2023-01-01').getTime();
  for(let i=1;i<=1500;i++){
    const cat=categories[Math.floor(rng()*categories.length)];
    const basePrice=cat==='Electronics'?120+rng()*400:cat==='Clothing'?15+rng()*80:cat==='Home'?25+rng()*200:10+rng()*50;
    const qty=Math.floor(rng()*5)+1;
    const discount=rng()<0.3?Math.floor(rng()*30):0;
    const price=+basePrice.toFixed(2);
    const revenue=+(price*qty*(1-discount/100)).toFixed(2);
    const daysOffset=Math.floor(rng()*700);
    const date=new Date(startDate+daysOffset*86400000).toISOString().slice(0,10);
    const returned=rng()<0.08?1:0;
    rows.push({order_id:'O'+(100000+i),customer_id:'C'+Math.floor(rng()*500+1000),order_date:date,category:cat,product_name:cat+'_SKU_'+Math.floor(rng()*200),unit_price:price,quantity:qty,discount_pct:discount,revenue,channel:channels[Math.floor(rng()*channels.length)],country:countries[Math.floor(rng()*countries.length)],returned});
  }
  return rows;
}

// 3. Credit Card Transactions (for Stats / ML fraud)
function generateFraudDataset(){
  const rng=mulberry32(99);const rows=[];

function toCSV(rows){if(!rows.length)return'';const h=Object.keys(rows[0]);return[h.join(','),...rows.map(r=>h.map(k=>{const v=r[k];if(v===null||v===undefined)return'';const s=String(v);return s.includes(',')||s.includes('"')?`"${s.replace(/"/g,'""')}"`:s}).join(','))].join('\n')}

function downloadCSV(rows,filename){const csv=toCSV(rows);const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}

// BACKEND API CLIENT — with offline resilience
// ═══════════════════════════════════════════════════════════
const API = {
  base() { return DB.get('api_url', '') || 'http://localhost:3001'; },
  userId() { return DB.get('user_id', null); },

  async call(path, opts = {}) {
    const url = this.base() + path;
    try {
      const res = await fetch(url, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        body: opts.body ? JSON.stringify(opts.body) : undefined
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return { ok: true, data: await res.json() };
    } catch (e) {
      return { ok: false, error: e.message };
    }
  },

  async health() { return this.call('/api/health'); },

  async createAnonUser() {
    const r = await this.call('/api/users/anon', { method: 'POST' });
    if (r.ok && r.data.user_id) DB.set('user_id', r.data.user_id);
    return r;
  },

  async loginGoogle(email, name) {
    const r = await this.call('/api/users/google', { method: 'POST', body: { email, name } });
    if (r.ok && r.data.user_id) DB.set('user_id', r.data.user_id);
    return r;
  },

  async getProgress() {
    const uid = this.userId();
    if (!uid) return { ok: false, error: 'No user' };
    return this.call('/api/progress/' + uid);
  },

  async recordAnswer(topic_id, question_idx, chosen, correct, difficulty) {
    const user_id = this.userId();
    if (!user_id) return { ok: false, error: 'No user' };
    return this.call('/api/answers', {
      method: 'POST',
      body: { user_id, topic_id, question_idx, chosen, correct, difficulty }
    });
  },

  async unlockAchievement(achievement_id) {
    const user_id = this.userId();
    if (!user_id) return { ok: false };
    return this.call('/api/achievements', { method: 'POST', body: { user_id, achievement_id } });
  },

  async recordProjectView() {
    const user_id = this.userId();
    if (!user_id) return { ok: false };
    return this.call('/api/projects/view', { method: 'POST', body: { user_id } });
  },

  async sync(progress) {
    const user_id = this.userId();
    if (!user_id) return { ok: false };
    const answers = Object.entries(progress.answers || {}).map(([key, val]) => {
      const [topic_id, question_idx] = key.split(':');
      const q = (QS[topic_id] || [])[parseInt(question_idx)];
      return {
        topic_id,
        question_idx: parseInt(question_idx),
        chosen: val.chosen,
        correct: val.correct,
        difficulty: q ? q.d : 'med'
      };
    });
    return this.call('/api/sync', {
      method: 'POST',
      body: { user_id, answers, unlocked: progress.unlocked || [] }
    });
  },

  async leaderboard() { return this.call('/api/leaderboard'); },

  async aiChat(provider, apiKey, messages, model) {
    return this.call('/api/ai/chat', {
      method: 'POST',
      body: { provider, api_key: apiKey, messages, model }
    });
  },

  async notionSync(token, pageId, stats) {
    return this.call('/api/notion/sync', {
      method: 'POST',
      body: { notion_token: token, page_id: pageId, stats }
    });
  },

  async notionLog(token, databaseId, entry) {
    return this.call('/api/notion/log', {
      method: 'POST',
      body: { notion_token: token, database_id: databaseId, entry }
    });
  }
};

// Offline queue for failed sync attempts
const SyncQueue = {
  add(action) {
    const q = DB.get('sync_queue', []);
    q.push({ action, ts: Date.now() });
    DB.set('sync_queue', q);
  },
  async flush() {
    const q = DB.get('sync_queue', []);
    if (!q.length) return;
    const remaining = [];
    for (const item of q) {
      try {
        if (item.action.type === 'answer') {
          const r = await API.recordAnswer(...item.action.args);
          if (!r.ok) remaining.push(item);
        } else if (item.action.type === 'achievement') {
          const r = await API.unlockAchievement(item.action.args[0]);
          if (!r.ok) remaining.push(item);
        }
      } catch (e) { remaining.push(item); }
    }
    DB.set('sync_queue', remaining);
  }
};

// ═══════════════════════════════════════════════════════════
// PROGRESS HOOK — local first, backend sync
// ═══════════════════════════════════════════════════════════
function useProgress() {
  const [progress, setProgress] = useState(() => DB.get('progress', {
    answers: {}, totalAnswered: 0, totalCorrect: 0, hardCorrect: 0,
    byTopic: {}, byDifficulty: { easy: 0, med: 0, hard: 0 },
    streak: 1, lastDate: null, projectsViewed: 0, unlocked: []
  }));
  const [backendOK, setBackendOK] = useState(false);

  // Check backend health + flush queue on mount
  useEffect(() => {
    (async () => {
      const h = await API.health();
      setBackendOK(h.ok);
      if (h.ok) {
        // Ensure we have a user
        if (!API.userId()) await API.createAnonUser();
        await SyncQueue.flush();
      }
    })();
  }, []);

  function recordAnswer(topicId, qIdx, q, chosenIdx) {
    const key = topicId + ':' + qIdx;
    const correct = chosenIdx === q.c;
    const already = progress.answers[key];
    const next = { ...progress, answers: { ...progress.answers, [key]: { chosen: chosenIdx, correct, ts: Date.now() } } };

    if (!already) {
      next.totalAnswered = (next.totalAnswered || 0) + 1;
      if (correct) {
        next.totalCorrect = (next.totalCorrect || 0) + 1;
        if (q.d === 'hard') next.hardCorrect = (next.hardCorrect || 0) + 1;
      }
      next.byTopic = { ...next.byTopic, [topicId]: (next.byTopic[topicId] || 0) + 1 };
      next.byDifficulty = { ...next.byDifficulty, [q.d]: (next.byDifficulty[q.d] || 0) + 1 };
    }

    const today = new Date().toISOString().slice(0, 10);
    if (next.lastDate !== today) {
      const yest = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      next.streak = next.lastDate === yest ? (next.streak || 0) + 1 : 1;
      next.lastDate = today;
    }

    const newUnlocks = ACHIEVEMENTS.filter(a => a.check(next) && !next.unlocked.includes(a.id)).map(a => a.id);
    if (newUnlocks.length) next.unlocked = [...next.unlocked, ...newUnlocks];

    setProgress(next);
    DB.set('progress', next);

    // Backend sync (fire-and-forget, queue on failure)
    (async () => {
      if (!API.userId()) {
        SyncQueue.add({ type: 'answer', args: [topicId, qIdx, chosenIdx, correct, q.d] });
        return;
      }
      const r = await API.recordAnswer(topicId, qIdx, chosenIdx, correct, q.d);
      if (!r.ok) SyncQueue.add({ type: 'answer', args: [topicId, qIdx, chosenIdx, correct, q.d] });
      for (const ach of newUnlocks) {
        const ar = await API.unlockAchievement(ach);
        if (!ar.ok) SyncQueue.add({ type: 'achievement', args: [ach] });
      }
    })();

    return { correct, newUnlocks };
  }

  function recordProjectView() {
    const next = { ...progress, projectsViewed: (progress.projectsViewed || 0) + 1 };
    const newUnlocks = ACHIEVEMENTS.filter(a => a.check(next) && !next.unlocked.includes(a.id)).map(a => a.id);
    next.unlocked = [...next.unlocked, ...newUnlocks];
    setProgress(next);
    DB.set('progress', next);
    API.recordProjectView();
  }

  async function pullFromBackend() {
    const r = await API.getProgress();
    if (r.ok) {
      const remote = r.data;
      const merged = {
        ...progress,
        totalAnswered: Math.max(progress.totalAnswered, remote.totalAnswered || 0),
        totalCorrect: Math.max(progress.totalCorrect, remote.totalCorrect || 0),
        hardCorrect: Math.max(progress.hardCorrect, remote.hardCorrect || 0),
        streak: Math.max(progress.streak || 0, remote.streak || 0),
        projectsViewed: Math.max(progress.projectsViewed, remote.projectsViewed || 0),
        byTopic: { ...remote.byTopic, ...progress.byTopic },
        byDifficulty: { ...remote.byDifficulty, ...progress.byDifficulty },
        answers: { ...remote.answers, ...progress.answers },
        unlocked: Array.from(new Set([...(progress.unlocked || []), ...(remote.unlocked || [])]))
      };
      setProgress(merged);
      DB.set('progress', merged);
    }
    return r;
  }

  return { progress, recordAnswer, recordProjectView, pullFromBackend, backendOK };
}

// QUIZ MODAL
// ═══════════════════════════════════════════════════════════
function QuizDetail({ topic, idx, qs, onBack, onNav, progress, onAnswer }) {
  const q = qs[idx];
  const key = topic.id + ':' + idx;
  const existing = progress.answers[key];
  const [selected, setSelected] = useState(existing ? existing.chosen : null);
  const answered = selected !== null;
  const isCorrect = answered && selected === q.c;
  const bc = d => d === 'easy' ? 'b-easy' : d === 'med' ? 'b-med' : 'b-hard';

  useEffect(() => { setSelected(existing ? existing.chosen : null); }, [idx]);

  const pick = i => {
    if (answered) return;
    setSelected(i);
    onAnswer(topic.id, idx, q, i);
  };

  return (
    <div className="modal" onClick={e => e.target === e.currentTarget && onBack()}>
      <div className="mbox">
        <div className="mh">
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
              <span className={'qbdg ' + bc(q.d)}>{q.d === 'med' ? 'MEDIUM' : q.d.toUpperCase()}</span>
              <span style={{fontFamily:'var(--fm)',fontSize:11,color:topic.c}}>{topic.i} {topic.n}</span>
              <span style={{fontFamily:'var(--fm)',fontSize:10,color:'#555'}}>#{idx+1}/{qs.length}</span>
            </div>
            <h2 style={{fontSize:19,fontWeight:700}}>{q.t}</h2>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
        </div>
        <div className="mb">
          {q.s && (<div className="scenar"><div className="scenar-lbl">📋 Scenario</div><div>{q.s}</div></div>)}
          <div className="qp">{q.p}</div>
          <div className="qopts">
            {q.o.map((opt, i) => {
              let cls = 'qopt';
              if (answered) {
                cls += ' dis';
                if (i === q.c) cls += selected === i ? ' ok' : ' shown';
                if (selected === i && i !== q.c) cls += ' no';
              }
              return (
                <button key={i} className={cls} onClick={() => pick(i)} disabled={answered}>
                  <div className="qk">{String.fromCharCode(65+i)}</div>
                  <div style={{flex:1}}>{opt}</div>
                  {answered && i === q.c && <span style={{color:'var(--ng)',fontSize:16,fontWeight:700}}>✓</span>}
                  {answered && selected === i && i !== q.c && <span style={{color:'var(--np)',fontSize:16,fontWeight:700}}>✗</span>}
                </button>
              );
            })}
          </div>
          {answered && (
            <div className={'qfb ' + (isCorrect ? 'qfb-ok' : 'qfb-no')}>
              <div className="qfb-t" style={{color:isCorrect?'var(--ng)':'var(--np)'}}>
                {isCorrect ? '✅ Correct!' : '❌ Not quite'}
              </div>
              <div className="qfb-e">{q.e}</div>
              {q.tg && q.tg.length > 0 && (
                <div className="qtags">{q.tg.map(t => <span key={t} className="qtag">#{t}</span>)}</div>
              )}
            </div>
          )}
          <div style={{display:'flex',gap:10,marginTop:20,flexWrap:'wrap'}}>
            {idx > 0 && <button className="btn btn-ghost btn-sm" onClick={() => onNav(idx - 1)}>← Previous</button>}
            {idx < qs.length - 1 && <button className="btn btn-ng btn-sm" onClick={() => onNav(idx + 1)}>Next →</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function QuizModal({ topic, onClose, progress, onAnswer }) {
  const qs = QS[topic.id] || [];
  const [page, setPage] = useState(0);
  const [openIdx, setOpenIdx] = useState(null);
  const perPage = 10;
  const totalPages = Math.max(1, Math.ceil(qs.length / perPage));
  const start = page * perPage;
  const pageQs = qs.slice(start, start + perPage);
  const bc = d => d === 'easy' ? 'b-easy' : d === 'med' ? 'b-med' : 'b-hard';

  if (openIdx !== null) {
    return <QuizDetail topic={topic} idx={openIdx} qs={qs} onBack={() => setOpenIdx(null)} onNav={setOpenIdx} progress={progress} onAnswer={onAnswer}/>;
  }

  const solved = qs.filter((_, i) => { const a = progress.answers[topic.id + ':' + i]; return a && a.correct; }).length;
  const attempted = qs.filter((_, i) => !!progress.answers[topic.id + ':' + i]).length;

  return (
    <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="mbox">
        <div className="mh">
          <div>
            <div style={{fontFamily:'var(--fm)',fontSize:11,color:topic.c,letterSpacing:2,textTransform:'uppercase',marginBottom:8}}>{topic.i} {topic.n}</div>
            <h2 style={{fontSize:22}}>{qs.length} Questions</h2>
            <div style={{fontSize:13,color:'#666',marginTop:8,fontFamily:'var(--fm)'}}>
              <span style={{color:'var(--ng)'}}>{solved}</span> solved · <span style={{color:'#888',margin:'0 6px'}}>{attempted}</span> attempted · <span style={{color:'var(--nc)',marginLeft:4}}>{qs.length - attempted}</span> remaining
            </div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="mb">
          <div className="qlist">
            {pageQs.map((q, i) => {
              const idx = start + i;
              const ans = progress.answers[topic.id + ':' + idx];
              const rowClass = ans ? (ans.correct ? 'qrow done' : 'qrow fail') : 'qrow';
              return (
                <div key={idx} className={rowClass} onClick={() => setOpenIdx(idx)}>
                  <span className="qnum">#{idx+1}</span>
                  <span className={'qbdg ' + bc(q.d)}>{q.d === 'med' ? 'MED' : q.d.toUpperCase()}</span>
                  <span className="qtit">{q.t}</span>
                  {ans && ans.correct && <span style={{color:'var(--ng)',fontSize:16}}>✓</span>}
                  {ans && !ans.correct && <span style={{color:'var(--np)',fontSize:16}}>✗</span>}
                </div>
              );
            })}
          </div>
          <div className="pagi">
            <button className="pgb" disabled={page === 0} onClick={() => setPage(page-1)}>← Prev</button>
            {Array.from({length: totalPages}, (_, i) => (
              <button key={i} className={'pgb' + (page === i ? ' a' : '')} onClick={() => setPage(i)}>{i+1}</button>
            ))}
            <button className="pgb" disabled={page === totalPages-1} onClick={() => setPage(page+1)}>Next →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function IntegrationsModal({ onClose, progress, backendOK, onPullRemote }) {
  const [apiUrl, setApiUrl] = useState(() => DB.get('api_url', 'http://localhost:3001'));

  const [health, setHealth] = useState(backendOK);

  const saveApi = async () => {
    DB.set('api_url', apiUrl);
    setStatus('API URL saved. Testing...');
    const r = await API.health();
    setHealth(r.ok);
    setStatus(r.ok ? '✅ Backend reachable!' : '❌ Backend unreachable at ' + apiUrl);
  };

  const saveGoogle = () => { DB.set('google_client_id', googleClientId); setStatus('Google Client ID saved.'); };
  const saveNotion = () => { DB.set('notion_token', notionToken); DB.set('notion_page_id', notionPageId); setStatus('Notion config saved.'); };

  const startGoogleAuth = () => {
    if (!googleClientId) { setStatus('Enter Google Client ID first.'); return; }
    const redirectUri = window.location.origin + window.location.pathname;
    const scope = 'openid email profile';
    const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(googleClientId)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(scope)}`;
    window.location.href = url;
  };

  const signOutGoogle = () => { DB.del('google_access_token'); setGoogleToken(''); setStatus('Signed out of Google.'); };

  const syncToBackend = async () => {
    setStatus('Syncing local progress to backend...');

// AI ASSISTANT MODAL
// Free providers: Groq (recommended), Google Gemini
// Paid: OpenAI, Anthropic
// ═══════════════════════════════════════════════════════════
function AIAssistantModal({ onClose, backendOK }) {
  const [provider, setProvider] = useState(() => DB.get('ai_provider', 'groq'));
  const [apiKey, setApiKey] = useState(() => DB.get('ai_key_' + DB.get('ai_provider', 'groq'), ''));
  const [messages, setMessages] = useState(() => DB.get('ai_messages', []));
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [showSetup, setShowSetup] = useState(() => !DB.get('ai_key_' + DB.get('ai_provider', 'groq'), ''));

  const providerInfo = {
    groq: { name: 'Groq', model: 'llama-3.3-70b-versatile', free: true, url: 'https://console.groq.com/keys', instructions: 'Sign up (no credit card). Generate API key. 100% free, very fast.' },
    gemini: { name: 'Google Gemini', model: 'gemini-2.0-flash', free: true, url: 'https://aistudio.google.com/apikey', instructions: 'Google account needed. Free tier: 15 req/min. No credit card.' },
    openai: { name: 'OpenAI', model: 'gpt-4o-mini', free: false, url: 'https://platform.openai.com/api-keys', instructions: 'Paid: ~$0.15 per 1M input tokens. Requires billing setup.' },
    anthropic: { name: 'Anthropic Claude', model: 'claude-haiku-4-5-20251001', free: false, url: 'https://console.anthropic.com/settings/keys', instructions: 'Paid. Haiku is cheapest Claude model.' }
  };

  useEffect(() => {
    // When provider changes, load the stored key for that provider
    const k = DB.get('ai_key_' + provider, '');
    setApiKey(k);
    setShowSetup(!k);
  }, [provider]);

  const saveKey = () => {
    DB.set('ai_key_' + provider, apiKey);
    DB.set('ai_provider', provider);
    setShowSetup(false);
  };

  const clearChat = () => {
    setMessages([]);
    DB.set('ai_messages', []);
  };

  const send = async () => {
    if (!input.trim() || loading) return;
    if (!apiKey) { setShowSetup(true); return; }
    if (!backendOK) {
      setMessages(prev => [...prev, { role: 'assistant', content: '⚠️ Backend is offline. The AI proxy requires the backend running at http://localhost:3001. Open Integrations (⚙) for setup.' }]);
      return;
    }

    const userMsg = { role: 'user', content: input.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true);

    const systemMsg = {
      role: 'system',
      content: 'You are a helpful data science tutor inside DS Mastery Hub. Keep responses concise (2-4 short paragraphs) and focused on practical, applied data science. Use examples when helpful. If the user asks about quiz content, help them understand concepts without giving away specific answers.'
    };

    try {
      const r = await API.aiChat(provider, apiKey, [systemMsg, ...newMessages], providerInfo[provider].model);
      if (r.ok) {
        const updated = [...newMessages, { role: 'assistant', content: r.data.text || '(empty response)' }];
        setMessages(updated);
        DB.set('ai_messages', updated);
      } else {
        let errorMsg = r.error || 'Unknown error';
        if (errorMsg.includes('404')) {
          errorMsg = '❌ 404 — Backend is running, but it doesn\'t have the AI endpoint. You\'re running an OLD version of server.js. Stop the backend (Ctrl+C in terminal) and run "node server.js" again with the NEW file I gave you. The new server.js is 509 lines and has /api/ai/chat.';
        } else if (errorMsg.includes('Failed to fetch') || errorMsg.includes('network')) {
          errorMsg = '❌ Backend not reachable. Is "node server.js" running? Check: ' + API.base();
        } else if (r.data && r.data.detail) {
          errorMsg = '❌ ' + errorMsg + ': ' + JSON.stringify(r.data.detail).slice(0, 300);
        }
        setMessages([...newMessages, { role: 'assistant', content: errorMsg }]);
      }
    } catch (e) {
      setMessages([...newMessages, { role: 'assistant', content: '❌ ' + e.message }]);
    }
    setLoading(false);
  };

  return (
    <div className="modal" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="mbox" style={{maxWidth:780,maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
        <div className="mh">
          <div style={{flex:1}}>
            <h2 style={{fontSize:20}}>🤖 AI Tutor</h2>
            <div style={{fontSize:12,color:'#666',marginTop:4,fontFamily:'var(--fm)'}}>
              Provider: <span style={{color:'var(--nc)'}}>{providerInfo[provider].name}</span>
              {providerInfo[provider].free && <span style={{color:'var(--ng)',marginLeft:8}}>· FREE</span>}
              {backendOK ? <span style={{color:'var(--ng)',marginLeft:8}}>● Connected</span> : <span style={{color:'var(--np)',marginLeft:8}}>● Backend offline</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={() => setShowSetup(!showSetup)}>{showSetup ? 'Hide' : '⚙'} Setup</button>
            <button className="btn btn-ghost btn-sm" onClick={clearChat}>Clear</button>
            <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
          </div>
        </div>

        {showSetup && (
          <div style={{padding:'20px 26px',borderBottom:'1px solid var(--line)',background:'#030303'}}>
            <div style={{fontFamily:'var(--fm)',fontSize:10,color:'#555',letterSpacing:2,textTransform:'uppercase',marginBottom:10}}>Choose Provider</div>
            <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
              {Object.keys(providerInfo).map(p => (
                <button key={p} className={'btn btn-sm ' + (provider === p ? 'btn-ng' : 'btn-ghost')} onClick={() => setProvider(p)}>
                  {providerInfo[p].name} {providerInfo[p].free && <span style={{color:'var(--ng)',marginLeft:4}}>FREE</span>}
                </button>
              ))}
            </div>
            <div style={{background:'#0a0a0a',border:'1px solid var(--line)',borderRadius:6,padding:'12px 16px',marginBottom:12,fontSize:13,color:'#aaa',lineHeight:1.7}}>
              <b style={{color:'var(--nc)'}}>{providerInfo[provider].name}</b>: {providerInfo[provider].instructions}<br/>
              Get your API key: <a href={providerInfo[provider].url} target="_blank" rel="noreferrer" style={{color:'var(--nc)'}}>{providerInfo[provider].url}</a>
            </div>
            <label style={{fontSize:11,color:'#666',fontFamily:'var(--fm)',letterSpacing:1,textTransform:'uppercase',display:'block',marginBottom:6}}>API Key (stored locally only)</label>
            <div style={{display:'flex',gap:8}}>
              <input className="input" type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder={provider === 'groq' ? 'gsk_...' : provider === 'gemini' ? 'AIza...' : provider === 'openai' ? 'sk-...' : 'sk-ant-...'} style={{flex:1}}/>
              <button className="btn btn-ng btn-sm" onClick={saveKey} disabled={!apiKey}>💾 Save</button>
            </div>
          </div>
        )}

        <div className="mb" style={{flex:1,overflowY:'auto',minHeight:200}}>
          {messages.length === 0 && !showSetup && (
            <div style={{textAlign:'center',padding:'40px 20px',color:'#555'}}>
              <div style={{fontSize:36,marginBottom:12}}>🤖</div>
              <div style={{fontFamily:'var(--fh)',fontSize:15,marginBottom:10,color:'#888'}}>Ask me anything about data science</div>
              <div style={{fontSize:13,color:'#555',lineHeight:1.7,maxWidth:400,margin:'0 auto'}}>
                Example prompts:<br/>
                <span style={{color:'var(--ng)'}}>"Explain the bias-variance tradeoff with a real example"</span><br/>
                <span style={{color:'var(--ng)'}}>"How do I handle imbalanced classes in XGBoost?"</span><br/>
                <span style={{color:'var(--ng)'}}>"What's the difference between L1 and L2 regularization?"</span>
              </div>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {messages.map((m, i) => (
              <div key={i} style={{
                background: m.role === 'user' ? '#0a0a14' : '#050505',
                border: '1px solid ' + (m.role === 'user' ? '#00e5ff33' : 'var(--line)'),
                borderLeft: '3px solid ' + (m.role === 'user' ? 'var(--nc)' : 'var(--ng)'),
                borderRadius: 6,
                padding: '12px 16px',
                fontSize: 14,
                lineHeight: 1.7,
                color: '#ddd',
                whiteSpace: 'pre-wrap'
              }}>
                <div style={{fontFamily:'var(--fm)',fontSize:10,color: m.role === 'user' ? 'var(--nc)' : 'var(--ng)',letterSpacing:1.5,textTransform:'uppercase',marginBottom:6}}>{m.role === 'user' ? 'You' : 'AI Tutor'}</div>
                {m.content}
              </div>
            ))}
            {loading && (
              <div style={{background:'#050505',border:'1px solid var(--line)',borderLeft:'3px solid var(--ng)',borderRadius:6,padding:'12px 16px',fontSize:14,color:'#666',fontStyle:'italic'}}>
                AI is thinking...
              </div>
            )}
          </div>
        </div>

        <div style={{padding:'14px 26px',borderTop:'1px solid var(--line)',display:'flex',gap:10}}>
          <input className="input" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), send())} placeholder={apiKey ? 'Ask anything about data science...' : 'Add an API key in Setup first'} disabled={loading}/>
          <button className="btn btn-ng btn-sm" onClick={send} disabled={loading || !input.trim() || !apiKey}>Send →</button>
        </div>
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════════════════
function HomeView({ setView, progress, backendOK }) {
  const totalQs = Object.values(QS).reduce((sum, arr) => sum + arr.length, 0);
  return (
    <div>
      <div className="hero">
        <div className="htag">DS MASTERY HUB · v1.0</div>
        <h1 className="htit">Learn Data Science<br/><span className="hgrad">by doing. Not watching.</span></h1>
        <p className="hsub">Real scenarios, real datasets, real decisions. {totalQs} practice questions across 12 topics. Production projects. Backend sync. 100% free tier.</p>
        <div className="hact">
          <button className="btn btn-solid btn-lg" onClick={() => setView('topics')}>Start Learning →</button>
          <button className="btn btn-ghost btn-lg" onClick={() => setView('projects')}>Browse Projects</button>
        </div>
      </div>

      <div className="sec">
        <div className="seyb">Quick Stats</div>
        <div className="g-stat">
          <div className="stat" style={{'--sc':'var(--ng)'}}>
            <div className="stat-v" style={{color:'var(--ng)'}}>{progress.totalCorrect}</div>
            <div className="stat-l">Solved</div>
            <div className="stat-c">of {progress.totalAnswered} attempted</div>
          </div>
          <div className="stat" style={{'--sc':'var(--nc)'}}>
            <div className="stat-v" style={{color:'var(--nc)'}}>{progress.totalAnswered ? Math.round(100*progress.totalCorrect/progress.totalAnswered) : 0}%</div>
            <div className="stat-l">Accuracy</div>
          </div>
          <div className="stat" style={{'--sc':'var(--no)'}}>
            <div className="stat-v" style={{color:'var(--no)'}}>{progress.streak || 1}🔥</div>
            <div className="stat-l">Day Streak</div>
          </div>
          <div className="stat" style={{'--sc':'var(--ny)'}}>
            <div className="stat-v" style={{color:'var(--ny)'}}>{(progress.unlocked || []).length}</div>
            <div className="stat-l">Achievements</div>
            <div className="stat-c">of {ACHIEVEMENTS.length}</div>
          </div>
        </div>
      </div>

      <div className="sec">
        <div className="seyb">Explore</div>
        <div className="g-proj">
          {[
            {id:'topics',i:'📚',t:'Topic Practice',d:`${totalQs} scenario-based questions across 12 topics with instant feedback.`,c:'var(--ng)'},
            {id:'projects',i:'🧪',t:'Real Projects',d:'Full scenarios: dataset (1200+ rows downloadable), problem, objective, steps, hints, output.',c:'var(--np)'},
            {id:'dashboard',i:'📊',t:'Dashboard',d:'Progress tracking, topic breakdown, achievements, streaks.',c:'var(--nc)'}
          ].map(m => (
            <div key={m.id} className="card" style={{padding:24,cursor:'pointer'}} onClick={() => setView(m.id)}>
              <span style={{fontSize:32,display:'block',marginBottom:12}}>{m.i}</span>
              <div style={{fontFamily:'var(--fh)',fontSize:17,fontWeight:700,color:m.c,marginBottom:8}}>{m.t}</div>
              <div style={{fontSize:13,color:'#888',lineHeight:1.6}}>{m.d}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="sec">
        <div className="seyb">Backend Status</div>
        <div className="card" style={{padding:20,display:'flex',alignItems:'center',gap:14}}>
          <span style={{fontSize:24}}>{backendOK ? '🟢' : '🔴'}</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700,color:backendOK?'var(--ng)':'var(--np)'}}>
              {backendOK ? 'Backend Connected' : 'Backend Offline (using local storage)'}
            </div>
            <div style={{fontSize:12,color:'#666',marginTop:4,fontFamily:'var(--fm)'}}>
              {backendOK ? 'Answers sync automatically across devices.' : 'Your progress is saved locally. Start the backend to sync.'}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function TopicsView({ progress, onAnswer }) {
  const [openTopic, setOpenTopic] = useState(null);
  return (
    <div>
      <div style={{marginBottom:28}}>
        <div className="seyb">Practice</div>
        <h2 className="stit">Choose a Topic</h2>
        <p className="ssub">Scenario-based questions across all 12 data science topics. Instant validation, explanations, progress tracking.</p>
      </div>
      <div className="g-topics">
        {TOPICS.map(t => {
          const qs = QS[t.id] || [];
          const solved = qs.filter((_, i) => { const a = progress.answers[t.id + ':' + i]; return a && a.correct; }).length;
          const pct = qs.length ? Math.round(100*solved/qs.length) : 0;
          return (
            <div key={t.id} className="tc" style={{borderTop:`3px solid ${t.c}`}} onClick={() => setOpenTopic(t)}>
              <span className="tc-i">{t.i}</span>
              <div className="tc-n" style={{color:t.c}}>{t.n}</div>
              <div className="tc-m">{qs.length} questions</div>
              <div className="tc-bar"><div className="tc-bar-fl" style={{width:pct+'%',background:t.c,boxShadow:`0 0 6px ${t.c}`}}></div></div>
              <div className="tc-pct">{solved}/{qs.length} solved · {pct}%</div>
            </div>
          );
        })}
      </div>
      {openTopic && <QuizModal topic={openTopic} onClose={() => setOpenTopic(null)} progress={progress} onAnswer={onAnswer}/>}
    </div>
  );
}

function ProjectsView({ onView }) {
  const [open, setOpen] = useState(null);
  return (
    <div>
      <div style={{marginBottom:28}}>
        <div className="seyb">Real Projects</div>
        <h2 className="stit">End-to-End Scenarios</h2>
        <p className="ssub">Complete project briefs with downloadable datasets, business problems, step-by-step approaches, hints, and expected outputs.</p>
      </div>
      <div className="g-proj">
        {PROJECTS.map(p => (
          <div key={p.id} className="card card-np" style={{padding:24,cursor:'pointer'}} onClick={() => setOpen(p)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <span style={{fontFamily:'var(--fm)',fontSize:10,color:p.color,letterSpacing:2,textTransform:'uppercase'}}>{p.cat}</span>
              <span className="qbdg b-hard">{p.diff.toUpperCase()}</span>
            </div>
            <span style={{fontSize:32,display:'block',marginBottom:12}}>{p.icon}</span>
            <div style={{fontFamily:'var(--fh)',fontSize:17,fontWeight:700,marginBottom:10}}>{p.title}</div>
            <div style={{fontSize:13,color:'#888',lineHeight:1.6,marginBottom:14}}>{p.problem.substring(0, 160)}...</div>
            <div style={{fontFamily:'var(--fm)',fontSize:11,color:'#555',display:'flex',justifyContent:'space-between'}}>
              <span>📊 {p.dataset.rows.toLocaleString()} rows · CSV</span>
              <span style={{color:p.color}}>Open →</span>
            </div>
          </div>
        ))}
      </div>
      {open && <ProjectModal project={open} onClose={() => setOpen(null)} onView={onView}/>}
    </div>
  );
}

function DashboardView({ progress }) {
  const acc = progress.totalAnswered ? Math.round(100*progress.totalCorrect/progress.totalAnswered) : 0;
  return (
    <div>
      <div style={{marginBottom:28}}>
        <div className="seyb">Your Progress</div>
        <h2 className="stit">Dashboard</h2>
      </div>

      <div className="g-stat" style={{marginBottom:32}}>
        <div className="stat" style={{'--sc':'var(--ng)'}}><div className="stat-v" style={{color:'var(--ng)'}}>{progress.totalCorrect}</div><div className="stat-l">Correct Answers</div></div>
        <div className="stat" style={{'--sc':'var(--nc)'}}><div className="stat-v" style={{color:'var(--nc)'}}>{acc}%</div><div className="stat-l">Accuracy</div></div>
        <div className="stat" style={{'--sc':'var(--no)'}}><div className="stat-v" style={{color:'var(--no)'}}>{progress.streak || 1}🔥</div><div className="stat-l">Day Streak</div></div>
        <div className="stat" style={{'--sc':'var(--nv)'}}><div className="stat-v" style={{color:'var(--nv)'}}>{progress.totalAnswered}</div><div className="stat-l">Total Attempts</div></div>
      </div>

      <div className="sec">
        <div className="seyb">Topic Progress</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {TOPICS.map(t => {
            const qs = QS[t.id] || [];
            const solved = qs.filter((_, i) => { const a = progress.answers[t.id + ':' + i]; return a && a.correct; }).length;
            const pct = qs.length ? Math.round(100*solved/qs.length) : 0;
            return (
              <div key={t.id} className="card" style={{padding:'14px 18px',display:'flex',alignItems:'center',gap:14}}>
                <span style={{fontSize:22}}>{t.i}</span>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,alignItems:'center'}}>
                    <span style={{fontFamily:'var(--fh)',fontSize:13,fontWeight:600,color:t.c}}>{t.n}</span>
                    <span style={{fontFamily:'var(--fm)',fontSize:11,color:'#888'}}>{solved}/{qs.length} · {pct}%</span>
                  </div>
                  <div style={{height:4,background:'#0d0d0d',borderRadius:2,overflow:'hidden'}}>
                    <div style={{width:pct+'%',height:'100%',background:t.c,boxShadow:`0 0 6px ${t.c}`,transition:'width 1s'}}></div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="sec">
        <div className="seyb">Achievements ({(progress.unlocked || []).length}/{ACHIEVEMENTS.length})</div>
        <div className="ach-grid">
          {ACHIEVEMENTS.map(a => {
            const won = (progress.unlocked || []).includes(a.id);
            return (
              <div key={a.id} className={'ach ' + (won ? 'won' : 'locked')}>
                <span className="ach-i">{a.i}</span>
                <div className="ach-n" style={won ? {color:'var(--ny)'} : {}}>{a.n}</div>
                <div className="ach-d">{a.d}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState('home');
  const [showIntegrations, setShowIntegrations] = useState(false);
  const [showAI, setShowAI] = useState(false);
  const { progress, recordAnswer, recordProjectView, pullFromBackend, backendOK } = useProgress();

  useEffect(() => {
    if (window.location.hash.includes('access_token=')) {
      const params = new URLSearchParams(window.location.hash.substring(1));
      const token = params.get('access_token');
      if (token) {
        DB.set('google_access_token', token);
        window.history.replaceState(null, '', window.location.pathname);
      }
    }
  }, []);

  const googleConnected = !!DB.get('google_access_token', '');
  const aiConfigured = !!DB.get('ai_key_' + DB.get('ai_provider', 'groq'), '');

  const NAV = [
    {id:'home',i:'⌂',n:'Home'},
    {id:'topics',i:'📚',n:'Topics'},
    {id:'projects',i:'🧪',n:'Projects'},
    {id:'dashboard',i:'📊',n:'Stats'}
  ];

  const titles = {home:'DS MASTERY',topics:'TOPIC PRACTICE',projects:'PROJECTS',dashboard:'DASHBOARD'};

  return (
    <div className="app">
      <div className="sb">
        <div className="logo" onClick={() => setView('home')} title="DS Mastery"/>
        {NAV.map(n => (
          <button key={n.id} className={'nav ' + (view === n.id ? 'a' : '')} onClick={() => setView(n.id)} title={n.n}>
            <span className="nav-i">{n.i}</span>
            <span className="nav-l">{n.n}</span>
          </button>
        ))}
        <div style={{flex:1}}/>
        <button className="nav" onClick={() => setShowAI(true)} title="AI Tutor" style={{color:aiConfigured?'var(--nv)':'#666'}}>
          <span className="nav-i">🤖</span>
          <span className="nav-l">AI</span>
        </button>
        <button className="nav" onClick={() => setShowIntegrations(true)} title="Integrations" style={{color:backendOK?'var(--ng)':'#666'}}>
          <span className="nav-i">⚙</span>
          <span className="nav-l">API</span>
        </button>
      </div>

      <div className="main">
        <div className="tbar">
          <span className="tbar-title">{titles[view]}</span>
          <div className="tbar-sp"/>
          <div className="api-chip" style={{borderColor:aiConfigured?'#aa00ff55':'#333',color:aiConfigured?'var(--nv)':'#666',marginRight:8,cursor:'pointer'}} onClick={() => setShowAI(true)}>
            <span className="dot" style={{background:'currentColor'}}/>
            🤖 AI TUTOR
          </div>
          <div className={'api-chip ' + (backendOK ? 'on' : 'off')} onClick={() => setShowIntegrations(true)}>
            <span className="dot"/>
            {backendOK ? 'BACKEND CONNECTED' : 'BACKEND OFFLINE'}
          </div>
        </div>
        <div className="content">
          {view === 'home' && <HomeView setView={setView} progress={progress} backendOK={backendOK}/>}
          {view === 'topics' && <TopicsView progress={progress} onAnswer={recordAnswer}/>}
          {view === 'projects' && <ProjectsView onView={recordProjectView}/>}
          {view === 'dashboard' && <DashboardView progress={progress}/>}
        </div>
      </div>

      {showIntegrations && <IntegrationsModal onClose={() => setShowIntegrations(false)} progress={progress} backendOK={backendOK} onPullRemote={pullFromBackend}/>}
      {showAI && <AIAssistantModal onClose={() => setShowAI(false)} backendOK={backendOK}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
